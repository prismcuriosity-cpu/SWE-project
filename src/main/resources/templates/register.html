<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Student Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="topbar">
    <p class="brand">🎓 Student Portal</p>
    <nav>
        <a th:href="@{/login}">Login</a>
    </nav>
</div>

<div class="container">
    <div class="card auth-card">
        <h1>Create your account</h1>

        <div id="register-error" class="alert alert-error"
             th:if="${registrationError}" th:text="${registrationError}"></div>

        <form th:action="@{/register}" th:object="${registrationForm}" method="post">
            <label for="username">Username</label>
            <input type="text" id="username" th:field="*{username}" required>
            <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>

            <label for="password">Password</label>
            <input type="password" id="password" th:field="*{password}" required>
            <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>

            <label for="fullName">Full name</label>
            <input type="text" id="fullName" th:field="*{fullName}" required>
            <div class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>

            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" required>
            <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>

            <label for="program">Program</label>
            <input type="text" id="program" th:field="*{program}" placeholder="e.g. BSc Computer Science">

            <label for="enrollmentYear">Enrollment year</label>
            <input type="number" id="enrollmentYear" th:field="*{enrollmentYear}" placeholder="e.g. 2024">

            <button id="register-submit" type="submit">Register</button>
        </form>

        <p class="muted" style="margin-top:18px;">
            Already have an account? <a class="link" th:href="@{/login}">Login here</a>
        </p>
    </div>
</div>
</body>
</html>
