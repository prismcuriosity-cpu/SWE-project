spring.application.name=student-portal

# ---------------------------------------------------------------------------
# Embedded H2 database (file-based, persisted under ./data so data survives
# application restarts). A web console is available at /h2-console.
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./data/studentportal
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# H2 web console (development aid)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf: disable template cache for easier local development
spring.thymeleaf.cache=false

# Server
server.port=8080
